<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScanFlow Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --primary: #5e5ce6; 
            --bg: #f2f2f7; 
            --card: #ffffff;
            --text: #1c1c1e;
            --sidebar: #ffffff;
        }

        /* Themes Jo Aapne Maangi Thi */
        .dark-theme { --bg: #1c1c1e; --card: #2c2c2e; --text: #ffffff; --sidebar: #000000; }
        .ocean-theme { --primary: #007aff; --bg: #e5f1ff; --sidebar: #cce3ff; }
        .sunset-theme { --primary: #ff3b30; --bg: #ffe5e5; --sidebar: #ffcccc; }
        
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }
        
        .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid rgba(0,0,0,0.1); padding: 25px 15px; flex-shrink: 0; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-link { padding: 14px; margin: 8px 0; border-radius: 12px; cursor: pointer; color: #8e8e93; font-weight: 600; }
        .nav-link.active { background: var(--primary); color: #fff; }

        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .tab { display: none; max-width: 550px; margin: 0 auto; }
        .tab.active { display: block; }
        .card { background: var(--card); border-radius: 32px; padding: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; }

        #reader { width: 100%; border-radius: 25px; overflow: hidden; background: #000; margin-bottom: 20px; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 18px; width: 100%; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* Popup Result */
        #res-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 28px; width: 320px; text-align: center; }
        
        /* Generator Interface */
        .gen-modes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .mode-btn { background: #f2f2f7; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; color: #000; text-align: center; }
        .mode-btn.active { background: var(--primary); color: #fff; }

        input { width: 100%; padding: 16px; border-radius: 15px; border: 1.5px solid #eee; margin: 15px 0; box-sizing: border-box; outline: none; }
        #qr-wrap { padding: 20px; background: white; display: inline-block; border-radius: 20px; margin: 20px 0; }
        
        .history-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.1); text-align: left; }
        .color-pick { width: 50px; height: 50px; border-radius: 50%; cursor: pointer; border: 3px solid #fff; }
    </style>
</head>
<body>

<div id="res-modal">
    <div class="modal-box">
        <h3>Scan Result</h3>
        <p id="scanned-val" style="word-break: break-all; color: var(--primary); font-weight: bold;"></p>
        <button class="btn" onclick="window.open(lastResult, '_blank')">Open Link</button>
        <button class="btn" style="background:#555" onclick="copyText()">Copy Link</button>
        <button class="btn" style="background:#888" onclick="shareLink()">Share Link</button>
        <button class="btn" style="background:#ff3b30; margin-top:20px;" onclick="closeScan()">Scan New</button>
    </div>
</div>

<div class="sidebar">
    <div class="logo">ScanFlow</div>
    <div class="nav-link active" onclick="switchTab('scanner', this)">Scanner</div>
    <div class="nav-link" onclick="switchTab('generator', this)">Generator</div>
    <div class="nav-link" onclick="switchTab('history', this)">History</div>
    <div class="nav-link" onclick="switchTab('settings', this)">Settings</div>
</div>

<div class="main">
    <div id="scanner" class="tab active">
        <h1>Scanner</h1>
        <div class="card">
            <div id="reader"></div>
            <button class="btn" onclick="initCamera()">Start Camera</button>
        </div>
    </div>

    <div id="generator" class="tab">
        <h1>Generator</h1>
        <div class="card">
            <div class="gen-modes">
                <div class="mode-btn active" onclick="setMode('URL', 'https://', this)">Link</div>
                <div class="mode-btn" onclick="setMode('TEXT', 'Message...', this)">Text</div>
                <div class="mode-btn" onclick="setMode('WIFI', 'WiFi:Pass', this)">WiFi</div>
                <div class="mode-btn" onclick="setMode('MAIL', 'email@to.com', this)">Mail</div>
            </div>
            <input type="text" id="qr-input" placeholder="https://">
            <div id="qr-wrap"></div>
            <button class="btn" onclick="generateQR()">Generate QR</button>
        </div>
    </div>

    <div id="history" class="tab">
        <h1>History</h1>
        <div id="hist-list"></div>
    </div>

    <div id="settings" class="tab">
        <h1>Settings</h1>
        <div class="card" style="text-align:left;">
            <h3>App Color</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <div class="color-pick" style="background:#5e5ce6;" onclick="setTheme('classic')"></div>
                <div class="color-pick" style="background:#007aff;" onclick="setTheme('ocean')"></div>
                <div class="color-pick" style="background:#ff3b30;" onclick="setTheme('sunset')"></div>
            </div>
            <button class="btn" style="background:#333" onclick="setMode('dark')">Dark Mode</button>
            <button class="btn" style="background:#eee; color:#000" onclick="setMode('light')">Light Mode</button>
            <hr style="margin:20px 0; border:0.5px solid #eee;">
            <p><b>Version:</b> 7.2.1 VIP</p>
            <p><b>Build:</b> March 2026</p>
            <button class="btn" style="background:red" onclick="clearAll()">Factory Reset</button>
        </div>
    </div>
</div>

<script>
    let scanner, lastResult;
    let history = JSON.parse(localStorage.getItem('muiz_data')) || [];

    function switchTab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'history') showHistory();
    }

    function setTheme(t) {
        document.body.classList.remove('ocean-theme', 'sunset-theme');
        if(t !== 'classic') document.body.classList.add(t + '-theme');
    }

    function setMode(m) { m === 'dark' ? document.body.classList.add('dark-theme') : document.body.classList.remove('dark-theme'); }

    function setMode(mode, ph, el) {
        document.getElementById('qr-input').placeholder = ph;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function generateQR() {
        const val = document.getElementById('qr-input').value;
        if(!val) return;
        const out = document.getElementById('qr-wrap');
        out.innerHTML = "";
        new QRCode(out, { text: val, width: 170, height: 170 });
        saveHist("Generated: " + val);
    }

    function initCamera() {
        if(scanner) scanner.clear();
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            lastResult = txt;
            document.getElementById('scanned-val').innerText = txt;
            document.getElementById('res-modal').style.display = 'flex';
            saveHist("Scanned: " + txt);
            scanner.stop();
        });
    }

    function closeScan() { document.getElementById('res-modal').style.display = 'none'; initCamera(); }
    function copyText() { navigator.clipboard.writeText(lastResult); alert("Copied!"); }
    function shareLink() { navigator.share({text: lastResult}); }
    function saveHist(v) { history.push({v, d: new Date().toLocaleTimeString()}); localStorage.setItem('muiz_data', JSON.stringify(history)); }
    function showHistory() { const list = document.getElementById('hist-list'); list.innerHTML = history.map(h => `<div class="history-item"><b>${h.v}</b><br><small>${h.d}</small></div>`).reverse().join(''); }
    function clearAll() { localStorage.clear(); location.reload(); }
</script>
</body>
        </html>
