<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanFlow Pro v6.0 - Master</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root { --primary: #5e5ce6; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --sidebar: #ffffff; }
        .dark-mode { --bg: #000000; --sidebar: #1c1c1e; --card: #2c2c2e; --text: #ffffff; }
        
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid rgba(0,0,0,0.1); padding: 25px 15px; flex-shrink: 0; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-link { padding: 14px; margin: 8px 0; border-radius: 12px; cursor: pointer; color: #8e8e93; font-weight: 600; }
        .nav-link.active { background: var(--primary); color: #fff; }

        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .tab { display: none; max-width: 550px; margin: 0 auto; }
        .tab.active { display: block; }
        .card { background: var(--card); border-radius: 32px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; }

        #reader { width: 100%; border-radius: 24px; overflow: hidden; background: #000; margin-bottom: 20px; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* Modal Popup */
        #res-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 28px; width: 320px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        
        .history-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.1); text-align: left; }
    </style>
</head>
<body>

<div id="res-modal">
    <div class="modal-box">
        <h3 style="margin-top:0">Scan Result</h3>
        <p id="scanned-val" style="word-break: break-all; color: var(--primary); font-weight: bold; font-size: 18px;"></p>
        <button class="btn" onclick="window.open(lastResult, '_blank')">Open Link</button>
        <button class="btn" style="background:#555" onclick="copyText()">Copy Link</button>
        <button class="btn" style="background:#888" onclick="shareText()">Share Link</button>
        <button class="btn" style="background:#ff3b30; margin-top:20px;" onclick="closeScan()">Scan New</button>
    </div>
</div>

<div class="sidebar">
    <div class="logo">ScanFlow</div>
    <div class="nav-link active" onclick="switchTab('scanner', this)">Scanner</div>
    <div class="nav-link" onclick="switchTab('generator', this)">Generator</div>
    <div class="nav-link" onclick="switchTab('history', this)">History</div>
    <div class="nav-link" onclick="switchTab('settings', this)">Settings</div>
</div>

<div class="main">
    <div id="scanner" class="tab active">
        <h1>Scanner</h1>
        <div class="card">
            <div id="reader"></div>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <button class="btn" style="flex:1;" onclick="toggleFlash()">🔦 Flash</button>
                <button class="btn" style="flex:1;" onclick="document.getElementById('img-in').click()">🖼️ Gallery</button>
            </div>
            <input type="file" id="img-in" hidden accept="image/*" onchange="fileScan(event)">
            <button class="btn" onclick="initCamera()">Start Camera</button>
        </div>
    </div>

    <div id="generator" class="tab">
        <h1>Generator</h1>
        <div class="card">
            <input type="text" id="qr-text" placeholder="Paste link here..." style="width:100%; padding:15px; border-radius:12px; border:1px solid #ddd; margin-bottom:15px;">
            <div id="qr-out" style="display:flex; justify-content:center; margin-bottom:20px;"></div>
            <button class="btn" onclick="genQR()">Generate QR Code</button>
            <button class="btn" style="background:#888" onclick="resetGen()">Reset</button>
        </div>
    </div>

    <div id="history" class="tab">
        <h1>History</h1>
        <div id="hist-list"></div>
    </div>

    <div id="settings" class="tab">
        <h1>Settings</h1>
        <div class="card" style="text-align:left;">
            <h3>App Info</h3>
            <p><b>Name:</b> ScanFlow Pro Master</p>
            <p><b>Version:</b> 6.0.0 (Neural)</p>
            <p><b>Build:</b> March 17, 2026</p>
            <hr>
            <h3>Personalization</h3>
            <button class="btn" style="background:#333" onclick="setMode('dark')">Dark Mode</button>
            <button class="btn" style="background:#eee; color:#000" onclick="setMode('light')">Light Mode</button>
            <button class="btn" style="background:red; margin-top:30px;" onclick="clearAll()">Factory Reset App</button>
        </div>
    </div>
</div>

<script>
    let scanner, lastResult, flashOn = false;
    let history = JSON.parse(localStorage.getItem('sf_scans_v6')) || [];

    function switchTab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'history') showHistory();
    }

    function initCamera() {
        if(scanner) scanner.clear();
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
            lastResult = txt;
            document.getElementById('scanned-val').innerText = txt;
            document.getElementById('res-modal').style.display = 'flex';
            saveHist(txt);
            scanner.stop();
        });
    }

    async function toggleFlash() {
        if(!scanner) return;
        flashOn = !flashOn;
        const track = scanner.getRunningTrack();
        if(track) await track.applyConstraints({ advanced: [{ torch: flashOn }] });
    }

    function fileScan(e) {
        const file = e.target.files[0];
        if(!file) return;
        const s = new Html5Qrcode("reader");
        s.scanFile(file, true).then(txt => {
            lastResult = txt;
            document.getElementById('scanned-val').innerText = txt;
            document.getElementById('res-modal').style.display = 'flex';
            saveHist(txt);
        }).catch(err => alert("No QR found in image!"));
    }

    function closeScan() { document.getElementById('res-modal').style.display = 'none'; initCamera(); }
    function copyText() { navigator.clipboard.writeText(lastResult); alert("Copied!"); }
    function shareText() { navigator.share({text: lastResult}); }
    
    function genQR() {
        const val = document.getElementById('qr-text').value;
        const out = document.getElementById('qr-out');
        out.innerHTML = "";
        new QRCode(out, { text: val, width: 170, height: 170, colorDark: "#5e5ce6" });
    }

    function resetGen() { document.getElementById('qr-text').value = ""; document.getElementById('qr-out').innerHTML = ""; }

    function saveHist(v) {
        history.push({v, d: new Date().toLocaleString()});
        localStorage.setItem('sf_scans_v6', JSON.stringify(history));
    }

    function showHistory() {
        const list = document.getElementById('hist-list');
        list.innerHTML = history.length ? history.map(h => `<div class="history-item"><b>${h.v}</b><br><small>${h.d}</small></div>`).reverse().join('') : "<p style='text-align:center'>No scans yet</p>";
    }

    function setMode(m) { m === 'dark' ? document.body.classList.add('dark-mode') : document.body.classList.remove('dark-mode'); }
    function clearAll() { if(confirm("Reset everything?")) { localStorage.clear(); location.reload(); } }

    // Automatic check for naya version
    console.log("ScanFlow v6.0 Loaded Successfully");
</script>
</body>
    </html>
