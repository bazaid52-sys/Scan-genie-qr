<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanFlow Pro - Neural Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #5e5ce6; --bg: #f2f2f7; }
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: var(--bg); color: #1c1c1e; overflow: hidden; }
        
        /* Sidebar - Standard Professional Look */
        .sidebar { width: 240px; background: #fff; border-right: 1px solid #d1d1d6; padding: 25px 15px; flex-shrink: 0; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 40px; letter-spacing: -1px; }
        .nav-link { padding: 14px; margin: 8px 0; border-radius: 12px; cursor: pointer; color: #8e8e93; font-weight: 600; transition: 0.3s; }
        .nav-link.active { background: #5e5ce612; color: var(--primary); }

        /* Main Content Area */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-panel { display: none; max-width: 550px; }
        .tab-panel.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .header-title { font-size: 34px; font-weight: 700; margin-bottom: 30px; }
        .card { background: #fff; border-radius: 32px; padding: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); text-align: center; border: 1px solid #eee; }

        /* Scanner Frame */
        .scanner-viewport { width: 260px; height: 260px; background: #000; border-radius: 30px; margin: 0 auto 20px; position: relative; overflow: hidden; border: 4px solid #fff; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-laser { position: absolute; width: 100%; height: 3px; background: var(--primary); top: 0; animation: scan 2s infinite linear; box-shadow: 0 0 15px var(--primary); }
        @keyframes scan { 0% {top: 0;} 100% {top: 100%;} }

        /* Modern Controls */
        .control-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .icon-btn { width: 50px; height: 50px; background: #f2f2f7; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); }
        
        .zoom-slider-box { background: #f9f9fb; padding: 12px; border-radius: 15px; margin-bottom: 20px; }
        .zoom-bar { width: 90%; accent-color: var(--primary); }

        /* Generator Elements */
        .mode-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 20px; }
        .mode-btn { background: #f2f2f7; padding: 12px 5px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; }
        .mode-btn.active { background: var(--primary); color: white; }
        
        input { width: 100%; padding: 16px; border-radius: 15px; border: 1.5px solid #eee; margin: 15px 0; font-size: 16px; box-sizing: border-box; outline: none; }
        .btn-primary { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; font-size: 17px; font-weight: 700; cursor: pointer; }

        /* History & Settings Items */
        .list-item { background: #fff; padding: 16px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; border: 1px solid #f0f0f0; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ScanFlow</div>
    <div class="nav-link active" onclick="switchTab('scanner', this)">Scanner</div>
    <div class="nav-link" onclick="switchTab('generator', this)">Generator</div>
    <div class="nav-link" onclick="switchTab('history', this)">History</div>
    <div class="nav-link" onclick="switchTab('settings', this)">Settings</div>
</div>

<div class="main-content">
    <div id="scanner" class="tab-panel active">
        <h1 class="header-title">Scanner</h1>
        <div class="card">
            <div class="scanner-viewport">
                <video id="video" autoplay playsinline></video>
                <div class="scan-laser"></div>
            </div>
            <div class="control-group">
                <button class="icon-btn" onclick="toggleFlash()">🔦</button>
                <button class="icon-btn" onclick="document.getElementById('galleryInput').click()">🖼️</button>
                <input type="file" id="galleryInput" hidden accept="image/*" onchange="console.log('File Ready')">
            </div>
            <div class="zoom-slider-box">
                <span style="font-size:11px; color:#888;">Zoom Control</span><br>
                <input type="range" class="zoom-bar" min="1" max="5" step="0.1" value="1" oninput="applyZoom(this.value)">
            </div>
            <button class="btn-primary" onclick="initScanner()">START CAMERA</button>
        </div>
    </div>

    <div id="generator" class="tab-panel">
        <h1 class="header-title">Generator</h1>
        <div class="card">
            <div class="mode-selector">
                <div class="mode-btn active">Link</div>
                <div class="mode-btn">Text</div>
                <div class="mode-btn">WiFi</div>
                <div class="mode-btn">Vcard</div>
            </div>
            <input type="text" id="qr-input" placeholder="Paste link or type here...">
            <div id="qr-result" style="margin: 20px auto; display: flex; justify-content: center;"></div>
            <button class="btn-primary" onclick="generateQR()">GENERATE CODE</button>
        </div>
    </div>

    <div id="history" class="tab-panel">
        <h1 class="header-title">History</h1>
        <div id="history-list"></div>
    </div>

    <div id="settings" class="tab-panel">
        <h1 class="header-title">Settings</h1>
        <div class="card" style="text-align: left;">
            <p><b>App Version:</b> 2.0.5 Enterprise</p>
            <p><b>Scan Engine:</b> Neural v2.5</p>
            <button class="btn-primary" style="background:#ff3b30;" onclick="clearHistory()">Reset All Data</button>
        </div>
    </div>
</div>

<script>
    let videoTrack = null;
    let historyLogs = JSON.parse(localStorage.getItem('pro_scans')) || [];

    function switchTab(id, el) {
        document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'history') refreshHistory();
    }

    async function initScanner() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
            videoTrack = stream.getVideoTracks()[0];
        } catch (e) { alert("Camera access denied!"); }
    }

    async function toggleFlash() {
        if (!videoTrack) return;
        const settings = videoTrack.getSettings();
        try { await videoTrack.applyConstraints({ advanced: [{ torch: !settings.torch }] }); } 
        catch (e) { alert("Flash not supported"); }
    }

    async function applyZoom(val) {
        if (!videoTrack) return;
        try { await videoTrack.applyConstraints({ advanced: [{ zoom: val }] }); } catch (e) {}
    }

    function generateQR() {
        const inputVal = document.getElementById('qr-input').value;
        if(!inputVal) return;
        const container = document.getElementById('qr-result');
        container.innerHTML = "";
        new QRCode(container, { text: inputVal, width: 160, height: 160 });
        historyLogs.push({data: inputVal, time: new Date().toLocaleTimeString()});
        localStorage.setItem('pro_scans', JSON.stringify(historyLogs));
    }

    function refreshHistory() {
        const container = document.getElementById('history-list');
        container.innerHTML = historyLogs.length ? historyLogs.map(log => 
            `<div class="list-item"><b>${log.data}</b><span style="color:#aaa;">${log.time}</span></div>`
        ).reverse().join('') : "<p style='text-align:center; color:#888;'>No Scan History Found</p>";
    }

    function clearHistory() {
        localStorage.clear();
        location.reload();
    }
</script>
</body>
</html>
