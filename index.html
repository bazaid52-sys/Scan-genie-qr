<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScanFlow Master Pro v7.0</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --primary: #5e5ce6; 
            --bg: #f2f2f7; 
            --card: #ffffff;
            --text: #1c1c1e;
            --sidebar: #ffffff;
        }

        .ocean-theme { --primary: #007aff; --bg: #e5f1ff; --sidebar: #cce3ff; }
        .sunset-theme { --primary: #ff3b30; --bg: #ffe5e5; --sidebar: #ffcccc; }
        .violet-theme { --primary: #af52de; --bg: #f5e5ff; --sidebar: #eccfca; }
        .dark-theme { --bg: #1c1c1e; --card: #2c2c2e; --text: #ffffff; --sidebar: #000000; }
        
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; transition: 0.3s; }
        
        .sidebar { width: 240px; background: var(--sidebar); border-right: 1px solid rgba(0,0,0,0.1); padding: 25px 15px; flex-shrink: 0; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-link { padding: 14px; margin: 8px 0; border-radius: 12px; cursor: pointer; color: #8e8e93; font-weight: 600; }
        .nav-link.active { background: var(--primary); color: #fff; }

        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .tab { display: none; max-width: 550px; margin: 0 auto; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--card); border-radius: 32px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); text-align: center; }

        #reader { width: 100%; border-radius: 24px; overflow: hidden; background: #000; margin-bottom: 20px; }
        
        .cam-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { background: var(--primary); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-sec { background: #555; }

        #res-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 30px; border-radius: 28px; width: 320px; text-align: center; }
        
        .gen-modes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .mode-btn { background: #f2f2f7; padding: 12px; border-radius: 12px; font-size: 11px; font-weight: 700; cursor: pointer; color: #000; text-align: center; }
        .mode-btn.active { background: var(--primary); color: #fff; }

        input { width: 100%; padding: 16px; border-radius: 15px; border: 1.5px solid #eee; margin: 15px 0; box-sizing: border-box; outline: none; }
        #qr-wrap { padding: 20px; background: white; display: inline-block; border-radius: 20px; margin: 20px 0; }
        .history-item { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.1); text-align: left; }
    </style>
</head>
<body>

<div id="res-modal">
    <div class="modal-box">
        <h3>Scan Result</h3>
        <p id="scanned-val" style="word-break: break-all; color: var(--primary); font-weight: bold;"></p>
        <button class="btn" onclick="window.open(lastResult, '_blank')">Open Link</button>
        <button class="btn" style="background:#555" onclick="copyText()">Copy Link</button>
        <button class="btn" style="background:#007aff" onclick="shareResult()">Share Result</button>
        <button class="btn" style="background:#ff3b30; margin-top:20px;" onclick="closeScan()">Scan New</button>
    </div>
</div>

<div class="sidebar">
    <div class="logo">ScanFlow</div>
    <div class="nav-link active" onclick="switchTab('scanner', this)">Scanner</div>
    <div class="nav-link" onclick="switchTab('generator', this)">Generator</div>
    <div class="nav-link" onclick="switchTab('history', this)">History</div>
    <div class="nav-link" onclick="switchTab('settings', this)">Settings</div>
</div>

<div class="main">
    <div id="scanner" class="tab active">
        <h1>Scanner</h1>
        <div class="card">
            <div id="reader"></div>
            <button class="btn" id="start-btn" onclick="initCamera()">Start Camera</button>
            <div class="cam-controls">
                <button class="btn btn-sec" onclick="toggleFlash()">Flashlight</button>
                <button class="btn btn-sec" onclick="document.getElementById('file-input').click()">Gallery</button>
            </div>
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="scanFile(this)">
        </div>
    </div>

    <div id="generator" class="tab">
        <h1>Generator</h1>
        <div class="card">
            <div class="gen-modes">
                <div class="mode-btn active" onclick="setGenMode('URL', 'https://', this)">Link</div>
                <div class="mode-btn" onclick="setGenMode('TEXT', 'Message...', this)">Text</div>
                <div class="mode-btn" onclick="setGenMode('WIFI', 'WiFi:Name:Pass', this)">WiFi</div>
                <div class="mode-btn" onclick="setGenMode('MAIL', 'email@to.com', this)">Mail</div>
            </div>
            <input type="text" id="qr-input" placeholder="https://">
            <div id="qr-wrap"></div>
            <button class="btn" onclick="generateQR()">Generate QR Code</button>
            <button class="btn btn-sec" onclick="resetGen()">Reset</button>
        </div>
    </div>

    <div id="history" class="tab">
        <h1>History</h1>
        <div id="hist-list"></div>
    </div>

    <div id="settings" class="tab">
        <h1>Settings</h1>
        <div class="card" style="text-align:left;">
            <h3>App Theme</h3>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <div style="width:40px; height:40px; border-radius:50%; background:#5e5ce6; cursor:pointer;" onclick="setTheme('classic')"></div>
                <div style="width:40px; height:40px; border-radius:50%; background:#007aff; cursor:pointer;" onclick="setTheme('ocean')"></div>
                <div style="width:40px; height:40px; border-radius:50%; background:#ff3b30; cursor:pointer;" onclick="setTheme('sunset')"></div>
            </div>
            <button class="btn" style="background:#333" onclick="setAppMode('dark')">Dark Mode</button>
            <button class="btn btn-sec" onclick="setAppMode('light')">Light Mode</button>
            <hr>
            <button class="btn" style="background:red" onclick="clearAll()">Factory Reset</button>
        </div>
    </div>
</div>

<script>
    let scanner, lastResult;
    let isFlashOn = false;
    let history = JSON.parse(localStorage.getItem('sf_v7_data')) || [];

    function switchTab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'history') showHistory();
    }

    async function initCamera() {
        if(scanner) await scanner.clear();
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            handleResult(txt);
            scanner.stop();
        }).catch(err => alert("Camera error: " + err));
    }

    function toggleFlash() {
        if(!scanner) return;
        isFlashOn = !isFlashOn;
        scanner.applyVideoConstraints({ advanced: [{ torch: isFlashOn }] })
        .catch(e => alert("Torch not supported"));
    }

    function scanFile(input) {
        if (input.files.length === 0) return;
        const html5QrCode = new Html5Qrcode("reader");
        html5QrCode.scanFile(input.files[0], true)
            .then(txt => handleResult(txt))
            .catch(err => alert("No QR found"));
    }

    function handleResult(txt) {
        lastResult = txt;
        document.getElementById('scanned-val').innerText = txt;
        document.getElementById('res-modal').style.display = 'flex';
        saveHist("Scan: " + txt);
    }

    function shareResult() {
        if (navigator.share) {
            navigator.share({ title: 'Scan Result', text: lastResult })
            .catch(err => console.log('Error sharing', err));
        } else {
            alert("Sharing not supported on this browser/app");
        }
    }

    function setGenMode(mode, ph, el) {
        document.getElementById('qr-input').placeholder = ph;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function generateQR() {
        const val = document.getElementById('qr-input').value;
        if(!val) return;
        document.getElementById('qr-wrap').innerHTML = "";
        new QRCode(document.getElementById('qr-wrap'), { text: val, width: 180, height: 180 });
        saveHist("Gen: " + val);
    }

    function resetGen() { document.getElementById('qr-input').value = ""; document.getElementById('qr-wrap').innerHTML = ""; }
    function setTheme(t) { 
        document.body.classList.remove('ocean-theme', 'sunset-theme');
        if(t !== 'classic') document.body.classList.add(t + '-theme');
    }
    function setAppMode(m) { m === 'dark' ? document.body.classList.add('dark-theme') : document.body.classList.remove('dark-theme'); }
    function closeScan() { document.getElementById('res-modal').style.display = 'none'; initCamera(); }
    function copyText() { navigator.clipboard.writeText(lastResult); alert("Copied!"); }
    function saveHist(v) { history.push({v, d: new Date().toLocaleTimeString()}); localStorage.setItem('sf_v7_data', JSON.stringify(history)); }
    function showHistory() { const list = document.getElementById('hist-list'); list.innerHTML = history.map(h => `<div class="history-item"><b>${h.v}</b><br><small>${h.d}</small></div>`).reverse().join(''); }
    function clearAll() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
