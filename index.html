<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanFlow VIP Custom</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --primary: #5e5ce6; 
            --bg: #f2f2f7; 
            --radius: 18px;
            --sidebar-bg: #ffffff;
        }
        
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: var(--bg); color: #1c1c1e; overflow: hidden; transition: 0.3s; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: var(--sidebar-bg); border-right: 1px solid #d1d1d6; padding: 25px 15px; flex-shrink: 0; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-link { padding: 14px; margin: 8px 0; border-radius: 12px; cursor: pointer; color: #8e8e93; font-weight: 600; transition: 0.2s; }
        .nav-link.active { background: var(--primary); color: #fff; }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .tab { display: none; max-width: 550px; margin: 0 auto; }
        .tab.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: #fff; border-radius: 32px; padding: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); text-align: center; border: 1px solid #eee; }

        /* Scanner */
        #reader { width: 100%; border-radius: 25px; overflow: hidden; background: #000; }
        .controls { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .tool-btn { width: 50px; height: 50px; background: #f2f2f7; border-radius: 50%; border: none; cursor: pointer; font-size: 20px; }

        /* Generator & Settings */
        .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .color-dot { height: 45px; border-radius: 12px; cursor: pointer; border: 3px solid transparent; }
        .color-dot.active { border-color: #000; }

        input { width: 100%; padding: 16px; border-radius: var(--radius); border: 1.5px solid #eee; margin: 15px 0; font-size: 16px; outline: none; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: var(--radius); font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        
        #qr-res { margin: 20px auto; display: flex; justify-content: center; }
        .hist-item { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ScanFlow</div>
    <div class="nav-link active" onclick="showTab('scanner', this)">Scanner</div>
    <div class="nav-link" onclick="showTab('generator', this)">Generator</div>
    <div class="nav-link" onclick="showTab('history', this)">History</div>
    <div class="nav-link" onclick="showTab('settings', this)">Settings</div>
</div>

<div class="main">
    <div id="scanner" class="tab active">
        <h1 style="font-size:34px; font-weight:800;">Scanner</h1>
        <div class="card">
            <div id="reader"></div>
            <div class="controls">
                <button class="tool-btn" onclick="toggleFlash()">🔦</button>
                <button class="tool-btn" onclick="document.getElementById('file-in').click()">🖼️</button>
                <input type="file" id="file-in" hidden accept="image/*" onchange="scanFile(event)">
            </div>
            <button class="btn-action" onclick="startCamera()">START NEURAL SCAN</button>
        </div>
    </div>

    <div id="generator" class="tab">
        <h1 style="font-size:34px; font-weight:800;">Generator</h1>
        <div class="card">
            <input type="text" id="gen-input" placeholder="Enter link or text...">
            <div id="qr-res"></div>
            <button class="btn-action" onclick="makeQR()">GENERATE QR</button>
        </div>
    </div>

    <div id="history" class="tab">
        <h1 style="font-size:34px; font-weight:800;">History</h1>
        <div id="h-list"></div>
    </div>

    <div id="settings" class="tab">
        <h1 style="font-size:34px; font-weight:800;">Settings</h1>
        <div class="card" style="text-align:left;">
            <h3>App Theme Color</h3>
            <div class="theme-grid">
                <div class="color-dot" style="background:#5e5ce6;" onclick="changeTheme('#5e5ce6')"></div>
                <div class="color-dot" style="background:#fa709a;" onclick="changeTheme('#fa709a')"></div>
                <div class="color-dot" style="background:#4facfe;" onclick="changeTheme('#4facfe')"></div>
                <div class="color-dot" style="background:#000000;" onclick="changeTheme('#000000')"></div>
            </div>

            <h3>Button Style</h3>
            <div style="display:flex; gap:10px;">
                <button class="btn-action" style="flex:1;" onclick="changeRadius('18px')">Rounded</button>
                <button class="btn-action" style="flex:1; border-radius:0;" onclick="changeRadius('0px')">Sharp</button>
            </div>

            <hr style="margin:30px 0; border:0; border-top:1px solid #eee;">
            <button class="btn-action" style="background:#ff3b30;" onclick="localStorage.clear(); location.reload();">Reset App Data</button>
        </div>
    </div>
</div>

<script>
    let scanner;
    let logs = JSON.parse(localStorage.getItem('logs')) || [];

    function showTab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'history') updateHistory();
    }

    // Settings Functions
    function changeTheme(color) {
        document.documentElement.style.setProperty('--primary', color);
        localStorage.setItem('themeColor', color);
    }

    function changeRadius(rad) {
        document.documentElement.style.setProperty('--radius', rad);
        localStorage.setItem('btnRadius', rad);
    }

    // Scanner Logic
    function startCamera() {
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            alert("Scanned: " + txt);
            saveLog(txt);
        });
    }

    function scanFile(e) {
        const file = e.target.files[0];
        if(!file) return;
        const s = new Html5Qrcode("reader");
        s.scanFile(file, true).then(txt => { alert("Gallery Scan: " + txt); saveLog(txt); }).catch(err => alert("No QR found"));
    }

    // Generator
    function makeQR() {
        const val = document.getElementById('gen-input').value;
        if(!val) return;
        const res = document.getElementById('qr-res');
        res.innerHTML = "";
        new QRCode(res, { text: val, width: 160, height: 160, colorDark: getComputedStyle(document.documentElement).getPropertyValue('--primary').trim() });
        saveLog("Generated: " + val);
    }

    function saveLog(t) {
        logs.push({t, time: new Date().toLocaleTimeString()});
        localStorage.setItem('logs', JSON.stringify(logs));
    }

    function updateHistory() {
        const h = document.getElementById('h-list');
        h.innerHTML = logs.map(l => `<div class="hist-item"><b>${l.t}</b><small>${l.time}</small></div>`).reverse().join('');
    }

    // Load saved settings
    window.onload = () => {
        const c = localStorage.getItem('themeColor');
        const r = localStorage.getItem('btnRadius');
        if(c) changeTheme(c);
        if(r) changeRadius(r);
    }
</script>
</body>
</html>
