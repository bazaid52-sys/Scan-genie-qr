<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanFlow Pro</title>
    <style>
        :root { --primary: #5e5ce6; --bg: #f2f2f7; }
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: var(--bg); }
        
        /* Sidebar */
        .sidebar { width: 240px; background: #ffffff; border-right: 1px solid #d1d1d6; padding: 25px 15px; }
        .logo { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 40px; padding-left: 10px; }
        .nav-link { padding: 14px; margin: 5px 0; border-radius: 12px; cursor: pointer; color: #8e8e93; font-weight: 500; }
        .nav-link.active { background: #5e5ce615; color: var(--primary); }

        /* Content Area */
        .content { flex: 1; padding: 40px; }
        .header-title { font-size: 34px; font-weight: 700; margin-bottom: 30px; }

        /* THE EXACT SCANNER INTERFACE FROM VIDEO */
        .scanner-card { background: #ffffff; border-radius: 30px; padding: 50px; text-align: center; max-width: 480px; margin: 0 auto; box-shadow: 0 10px 40px rgba(0,0,0,0.03); }
        
        .scan-container {
            width: 220px;
            height: 220px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* The 4 Corner Borders (Exact Video Style) */
        .corner { position: absolute; width: 30px; height: 30px; border: 4px solid #e5e5ea; }
        .top-left { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 15px; }
        .top-right { top: 0; right: 0; border-left: none; border-bottom: none; border-top-right-radius: 15px; }
        .bottom-left { bottom: 0; left: 0; border-right: none; border-top: none; border-bottom-left-radius: 15px; }
        .bottom-right { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 15px; }

        .camera-icon { width: 60px; height: 45px; border: 3px solid #d1d1d6; border-radius: 8px; position: relative; }
        .camera-icon::after { content: ''; position: absolute; top: 10px; left: 18px; width: 18px; height: 18px; border: 3px solid #d1d1d6; border-radius: 50%; }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: var(--primary);
            top: 0;
            box-shadow: 0 0 15px var(--primary);
            animation: moveLine 2.5s infinite linear;
        }
        @keyframes moveLine { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        .status-text { font-size: 22px; font-weight: 700; color: #1c1c1e; margin-bottom: 8px; }
        .sub-text { color: #8e8e93; margin-bottom: 35px; font-size: 15px; }
        
        .btn-start {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 18px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-start:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ScanFlow</div>
        <div class="nav-link active">Scanner</div>
        <div class="nav-link">Generator</div>
        <div class="nav-link">History</div>
        <div class="nav-link">Settings</div>
    </div>

    <div class="content">
        <div class="header-title">Scanner</div>
        
        <div class="scanner-card">
            <div class="scan-container">
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>
                
                <div class="scan-line"></div>
                <div class="camera-icon"></div>
            </div>

            <div class="status-text">Neural scanner active</div>
            <div class="sub-text">Align QR code within the frame to start scanning.</div>
            
            <button class="btn-start">START SESSION</button>
        </div>
    </div>

</body>
</html>
