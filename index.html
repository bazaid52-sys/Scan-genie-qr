<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanFlow VIP Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #5e5ce6; --bg: #f2f2f7; }
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: #fff; border-right: 1px solid #d1d1d6; padding: 25px 15px; flex-shrink: 0; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-link { padding: 14px; margin: 8px 0; border-radius: 12px; cursor: pointer; color: #8e8e93; font-weight: 600; }
        .nav-link.active { background: #5e5ce612; color: var(--primary); }

        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .tab { display: none; max-width: 500px; margin: 0 auto; }
        .tab.active { display: block; }
        .card { background: #fff; border-radius: 32px; padding: 35px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); text-align: center; position: relative; }

        /* Scanner Frame */
        .scanner-container { width: 260px; height: 260px; background: #000; border-radius: 28px; margin: 0 auto 20px; position: relative; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: var(--primary); top: 0; animation: scan 2.5s infinite linear; box-shadow: 0 0 15px var(--primary); }
        @keyframes scan { 0% {top: 0;} 100% {top: 100%;} }

        /* Scanner Controls (Flash, Gallery, Zoom) */
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .icon-btn { width: 50px; height: 50px; background: #f2f2f7; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; transition: 0.3s; border: none; }
        .icon-btn:active { transform: scale(0.9); background: #e5e5ea; }
        
        .zoom-slider { width: 80%; margin: 10px auto; display: block; accent-color: var(--primary); }

        .btn-start { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; font-size: 17px; font-weight: 700; cursor: pointer; }
        
        input[type="file"] { display: none; } /* Hidden gallery input */
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">ScanFlow</div>
    <div class="nav-link active" onclick="showTab('scanner', this)">Scanner</div>
    <div class="nav-link" onclick="showTab('generator', this)">Generator</div>
    <div class="nav-link" onclick="showTab('history', this)">History</div>
</div>

<div class="main">
    <div id="scanner" class="tab active">
        <h1 style="font-size:34px; font-weight:800;">Scanner</h1>
        <div class="card">
            <div class="scanner-container">
                <video id="video" autoplay playsinline></video>
                <div class="scan-line"></div>
            </div>

            <div class="controls">
                <button class="icon-btn" onclick="toggleFlash()" title="Flashlight">🔦</button>
                <button class="icon-btn" onclick="document.getElementById('galleryInput').click()" title="Gallery">🖼️</button>
                <input type="file" id="galleryInput" accept="image/*" onchange="handleGallery(this)">
            </div>

            <p style="font-size:12px; color:#888; margin-bottom:5px;">Zoom Control</p>
            <input type="range" class="zoom-slider" min="1" max="5" step="0.1" value="1" oninput="handleZoom(this.value)">

            <h2 style="margin: 20px 0 5px;">Neural scanner active</h2>
            <p style="color:#888; margin-bottom:25px;">Point at QR or pick from gallery</p>
            
            <button class="btn-start" onclick="startCam()">START WITH CAMERA</button>
        </div>
    </div>

    <div id="generator" class="tab"><h1>Generator</h1><div class="card"><p>Generator UI Here</p></div></div>
    <div id="history" class="tab"><h1>History</h1><div id="h-list"></div></div>
</div>

<script>
    let stream = null;
    let track = null;

    function showTab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    async function startCam() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            const video = document.getElementById('video');
            video.srcObject = stream;
            track = stream.getVideoTracks()[0];
        } catch (e) { alert("Camera Permission Required!"); }
    }

    // Flashlight Toggle
    async function toggleFlash() {
        if (!track) return alert("Start camera first!");
        const capabilities = track.getCapabilities();
        if (!capabilities.torch) return alert("Flashlight not supported on this device");
        
        const settings = track.getSettings();
        await track.applyConstraints({
            advanced: [{ torch: !settings.torch }]
        });
    }

    // Zoom Control
    async function handleZoom(val) {
        if (!track) return;
        try {
            await track.applyConstraints({ advanced: [{ zoom: val }] });
        } catch (e) { console.log("Zoom not supported"); }
    }

    // Gallery Picker
    function handleGallery(input) {
        if (input.files && input.files[0]) {
            alert("Image '" + input.files[0].name + "' selected! Processing Neural Scan...");
            // Yahan par QR parsing library add kar sakte hain gallery scan ke liye
        }
    }
</script>
</body>
</html>
