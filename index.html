<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanFlow Pro - Auto Reset</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #5e5ce6; --bg: #f2f2f7; --card: #ffffff; --text: #1c1c1e; --sidebar: #ffffff; }
        .dark-theme { --bg: #1c1c1e; --card: #2c2c2e; --text: #ffffff; --sidebar: #000000; }
        
        body { margin: 0; font-family: -apple-system, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        .sidebar { width: 220px; background: var(--sidebar); border-right: 1px solid rgba(0,0,0,0.1); padding: 25px 15px; flex-shrink: 0; }
        .logo { font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 40px; }
        .nav-link { padding: 12px; margin: 8px 0; border-radius: 10px; cursor: pointer; color: #8e8e93; font-weight: 600; }
        .nav-link.active { background: var(--primary); color: #fff; }

        .main { flex: 1; padding: 30px; overflow-y: auto; }
        .tab { display: none; max-width: 500px; margin: 0 auto; }
        .tab.active { display: block; }
        .card { background: var(--card); border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }

        #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; position: relative; }
        .btn { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; }
        
        /* Modal */
        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); padding: 25px; border-radius: 20px; width: 85%; max-width: 350px; text-align: center; }
        
        .hist-item { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body>

<div id="result-modal">
    <div class="modal-box">
        <h3>Result Found</h3>
        <p id="res-data" style="word-break: break-all; color: var(--primary);"></p>
        <button class="btn" onclick="openLink()">Open Link</button>
        <button class="btn" style="background:#888" onclick="copyLink()">Copy Link</button>
        <button class="btn" style="background:#ff3b30" onclick="resetScanner()">Scan New QR</button>
    </div>
</div>

<div class="sidebar">
    <div class="logo">ScanFlow Pro</div>
    <div class="nav-link active" onclick="showTab('scanner', this)">Scanner</div>
    <div class="nav-link" onclick="showTab('generator', this)">Generator</div>
    <div class="nav-link" onclick="showTab('history', this)">History</div>
    <div class="nav-link" onclick="showTab('settings', this)">Settings</div>
</div>

<div class="main">
    <div id="scanner" class="tab active">
        <h1>Scanner</h1>
        <div class="card">
            <div id="reader"></div>
            <button class="btn" onclick="startCamera()">Start Camera</button>
        </div>
    </div>

    <div id="generator" class="tab">
        <h1>Generator</h1>
        <div class="card">
            <input type="text" id="gen-input" placeholder="Type here..." style="width:100%; padding:15px; border-radius:12px; border:1px solid #ddd;">
            <div id="qr-output" style="margin:20px 0; display:flex; justify-content:center;"></div>
            <button class="btn" onclick="makeQR()">Generate New</button>
            <button class="btn" style="background:#888" onclick="resetGenerator()">Reset Generator</button>
        </div>
    </div>

    <div id="history" class="tab">
        <h1>History</h1>
        <div id="history-list"></div>
    </div>

    <div id="settings" class="tab">
        <h1>Settings</h1>
        <div class="card" style="text-align:left;">
            <button class="btn" onclick="setMode('dark')">Dark Mode</button>
            <button class="btn" style="background:#eee; color:#000" onclick="setMode('light')">Light Mode</button>
            <hr>
            <p><b>Version:</b> 5.0.1</p>
            <p><b>Build:</b> March 2026</p>
            <button class="btn" style="background:#ff3b30" onclick="factoryReset()">FACTORY RESET APP</button>
        </div>
    </div>
</div>

<script>
    let html5QrCode, currentScan;
    let history = JSON.parse(localStorage.getItem('scans')) || [];

    function showTab(id, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'history') loadHistory();
    }

    function startCamera() {
        if(html5QrCode) html5QrCode.clear();
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
            currentScan = txt;
            document.getElementById('res-data').innerText = txt;
            document.getElementById('result-modal').style.display = 'flex';
            history.push({val: txt, date: new Date().toLocaleString()});
            localStorage.setItem('scans', JSON.stringify(history));
            html5QrCode.stop();
        });
    }

    function resetScanner() {
        document.getElementById('result-modal').style.display = 'none';
        startCamera(); // Auto-restart scanner without refresh
    }

    function makeQR() {
        const val = document.getElementById('gen-input').value;
        if(!val) return;
        const out = document.getElementById('qr-output');
        out.innerHTML = ""; // Clear old QR before making new
        new QRCode(out, { text: val, width: 150, height: 150 });
    }

    function resetGenerator() {
        document.getElementById('gen-input').value = "";
        document.getElementById('qr-output').innerHTML = "";
    }

    function factoryReset() {
        if(confirm("Pura data delete kar dein?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function copyLink() { navigator.clipboard.writeText(currentScan); alert("Copied!"); }
    function openLink() { window.open(currentScan, '_blank'); }
    function setMode(m) { m === 'dark' ? document.body.classList.add('dark-theme') : document.body.classList.remove('dark-theme'); }

    function loadHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = history.map(h => `<div class="hist-item"><b>${h.val}</b><br><small>${h.date}</small></div>`).reverse().join('');
    }
</script>
</body>
</html>
