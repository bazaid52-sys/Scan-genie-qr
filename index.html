<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanFlow VIP Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #5e5ce6; --bg: #f2f2f7; --card: #ffffff; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; height: 100vh; background: var(--bg); color: #1c1c1e; overflow: hidden; }
        
        /* Sidebar - Same as Video */
        .sidebar { width: 240px; background: #ffffff; border-right: 1px solid #d1d1d6; padding: 25px 15px; flex-shrink: 0; }
        .logo { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 40px; padding-left: 10px; letter-spacing: -1px; }
        .nav-link { padding: 14px 18px; margin: 8px 0; border-radius: 14px; cursor: pointer; color: #8e8e93; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .nav-link.active { background: #5e5ce612; color: var(--primary); transform: translateX(5px); }
        .nav-link:hover:not(.active) { background: #f2f2f7; color: #1c1c1e; }

        /* Content Area */
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; max-width: 550px; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header-title { font-size: 34px; font-weight: 700; margin-bottom: 30px; letter-spacing: -0.5px; }
        .card { background: var(--card); border-radius: 32px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.02); text-align: center; }

        /* Scanner Frame - Modern Video Look */
        .scanner-frame { width: 240px; height: 240px; background: #000; border-radius: 28px; margin: 0 auto 30px; position: relative; overflow: hidden; box-shadow: 0 10px 30px rgba(94, 92, 230, 0.2); }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .scan-laser { position: absolute; width: 100%; height: 3px; background: linear-gradient(to right, transparent, var(--primary), transparent); top: 0; box-shadow: 0 0 15px var(--primary); animation: scanLine 2.5s infinite ease-in-out; }
        @keyframes scanLine { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }

        /* Generator Styling */
        .temp-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .temp-item { background: #f2f2f7; padding: 12px; border-radius: 14px; font-size: 12px; font-weight: 700; cursor: pointer; color: #8e8e93; border: 2px solid transparent; }
        .temp-item.active { background: #ffffff; border-color: var(--primary); color: var(--primary); }
        
        .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .theme-box { height: 75px; border-radius: 16px; cursor: pointer; display: flex; align-items: flex-end; padding: 12px; color: white; font-weight: 800; font-size: 13px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }

        input { width: 100%; padding: 18px; border-radius: 16px; border: 2px solid #f2f2f7; margin: 15px 0; font-size: 16px; box-sizing: border-box; background: #f9f9fb; transition: 0.3s; }
        input:focus { border-color: var(--primary); outline: none; background: #fff; }

        .btn-start { background: var(--primary); color: white; border: none; padding: 20px; width: 100%; border-radius: 18px; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(94, 92, 230, 0.2); }
        .btn-start:active { transform: scale(0.98); }

        /* History Items */
        .history-card { background: #fff; padding: 20px; border-radius: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f2f2f7; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">ScanFlow</div>
        <div id="nav-scanner" class="nav-link active" onclick="showTab('scanner', this)">Scanner</div>
        <div id="nav-generator" class="nav-link" onclick="showTab('generator', this)">Generator</div>
        <div id="nav-history" class="nav-link" onclick="showTab('history', this)">History</div>
        <div id="nav-settings" class="nav-link" onclick="showTab('settings', this)">Settings</div>
    </div>

    <div class="main-content">
        <div id="scanner" class="tab-content active">
            <div class="header-title">Scanner</div>
            <div class="card">
                <div class="scanner-frame">
                    <video id="video" autoplay playsinline></video>
                    <div class="scan-laser"></div>
                </div>
                <h2 style="margin: 0; font-weight: 700;">Neural scanner active</h2>
                <p style="color: #8e8e93; margin: 10px 0 30px;">Align the QR code to start scanning</p>
                <button class="btn-start" onclick="initCam()">START WITH CAMERA</button>
            </div>
        </div>

        <div id="generator" class="tab-content">
            <div class="header-title">Generator</div>
            <div class="card">
                <div class="temp-grid">
                    <div class="temp-item active">Link</div>
                    <div class="temp-item">Text</div>
                    <div class="temp-item">WiFi</div>
                    <div class="temp-item">Vcard</div>
                </div>
                <input type="text" id="qr-data" placeholder="https://example.com">
                <div class="theme-grid">
                    <div class="theme-box" style="background: linear-gradient(135deg, #4facfe, #00f2fe);">Ocean</div>
                    <div class="theme-box" style="background: linear-gradient(135deg, #fa709a, #fee140);">Sunset</div>
                    <div class="theme-box" style="background: linear-gradient(135deg, #667eea, #764ba2);">Violet</div>
                </div>
                <div id="qr-code-area" style="margin: 20px 0; display: flex; justify-content: center;"></div>
                <button class="btn-start" onclick="createQR()">GENERATE QR</button>
            </div>
        </div>

        <div id="history" class="tab-content">
            <div class="header-title">History</div>
            <div id="history-list"></div>
        </div>

        <div id="settings" class="tab-content">
            <div class="header-title">Settings</div>
            <div class="card" style="text-align: left;">
                <p><b>App Version:</b> 2.0.4 Pro</p>
                <p><b>Engine:</b> Neural Scan 2.0</p>
                <button class="btn-start" style="background: #ff3b30;" onclick="localStorage.clear(); location.reload();">Reset All Data</button>
            </div>
        </div>
    </div>

    <script>
        let logs = JSON.parse(localStorage.getItem('scans')) || [];

        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(id === 'history') renderHistory();
        }

        async function initCam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                document.getElementById('video').srcObject = stream;
            } catch (e) { alert("Camera Permission Required!"); }
        }

        function createQR() {
            const val = document.getElementById('qr-data').value;
            if(!val) return;
            const area = document.getElementById('qr-code-area');
            area.innerHTML = "";
            new QRCode(area, { text: val, width: 180, height: 180 });
            logs.push({text: val, time: new Date().toLocaleTimeString()});
            localStorage.setItem('scans', JSON.stringify(logs));
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            if(logs.length === 0) { list.innerHTML = "<p style='color:#888;'>No scans yet.</p>"; return; }
            list.innerHTML = logs.map(l => `<div class="history-card"><b>${l.text}</b><span style="color:#aaa;">${l.time}</span></div>`).reverse().join('');
        }
    </script>
</body>
</html>
