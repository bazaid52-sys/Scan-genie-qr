<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScanFlow Pro Testing</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #5e5ce6; --bg: #f2f2f7; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); overflow: hidden; height: 100vh; }
        
        /* App Structure */
        .app-view { height: 100vh; display: flex; flex-direction: column; }
        .content-area { flex: 1; padding: 20px; overflow-y: auto; padding-bottom: 90px; }
        .tab-panel { display: none; animation: slideUp 0.3s ease; }
        .tab-panel.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* VIP Cards */
        .card { background: #fff; border-radius: 28px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; margin-bottom: 20px; }
        
        /* Scanner UI */
        .scan-window { width: 220px; height: 220px; background: #000; border-radius: 24px; margin: 0 auto 20px; position: relative; overflow: hidden; border: 4px solid #fff; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .laser { position: absolute; width: 100%; height: 3px; background: var(--primary); top: 0; box-shadow: 0 0 15px var(--primary); animation: scanLoop 2s infinite linear; }
        @keyframes scanLoop { 0% { top: 0%; } 100% { top: 100%; } }

        /* Generator Grid */
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .chip { background: #f2f2f7; padding: 12px 5px; border-radius: 12px; font-size: 11px; font-weight: 600; cursor: pointer; }
        .chip.active { background: var(--primary); color: white; }
        
        .theme-flex { display: flex; gap: 10px; margin: 15px 0; }
        .theme-swatch { flex: 1; height: 60px; border-radius: 12px; cursor: pointer; display: flex; align-items: flex-end; padding: 8px; color: white; font-weight: bold; font-size: 10px; }

        input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #d1d1d6; margin: 15px 0; font-size: 16px; outline: none; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 18px; width: 100%; border-radius: 18px; font-size: 17px; font-weight: 700; cursor: pointer; box-shadow: 0 5px 15px rgba(94, 92, 230, 0.3); }

        /* Bottom Navigation */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-top: 1px solid #d1d1d6; display: flex; padding: 12px 0; }
        .nav-item { flex: 1; text-align: center; font-size: 11px; color: #8e8e93; font-weight: 600; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

<div class="app-view">
    <div class="content-area">
        
        <div id="tab-scanner" class="tab-panel active">
            <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 5px;">Scanner</h1>
            <p style="color: #888; margin-bottom: 25px;">Neural engine ready.</p>
            <div class="card">
                <div class="scan-window">
                    <video id="video" autoplay playsinline></video>
                    <div class="laser"></div>
                </div>
                <h3 style="margin: 0;">Scanner Active</h3>
                <p style="color: #888; font-size: 14px; margin: 10px 0 20px;">Align the QR code within the frame</p>
                <button class="btn-action" onclick="initCamera()">START WITH CAMERA</button>
            </div>
        </div>

        <div id="tab-generator" class="tab-panel">
            <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 25px;">Generator</h1>
            <div class="card">
                <div class="grid-4">
                    <div class="chip active">Link</div><div class="chip">Text</div><div class="chip">Mail</div><div class="chip">WiFi</div>
                </div>
                <input type="text" id="qr-data" placeholder="Type or paste link...">
                <div class="theme-flex">
                    <div class="theme-swatch" style="background: linear-gradient(45deg, #4facfe, #00f2fe);">Ocean</div>
                    <div class="theme-swatch" style="background: linear-gradient(45deg, #fa709a, #fee140);">Sunset</div>
                    <div class="theme-swatch" style="background: linear-gradient(45deg, #667eea, #764ba2);">Violet</div>
                </div>
                <div id="qr-output" style="margin: 20px auto; display: flex; justify-content: center;"></div>
                <button class="btn-action" onclick="makeQR()">GENERATE QR</button>
            </div>
        </div>

        <div id="tab-history" class="tab-panel">
            <h1 style="font-size: 32px; font-weight: 800; margin-bottom: 25px;">History</h1>
            <div id="log-list"></div>
        </div>

    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchView('tab-scanner', this)">🔍<br>Scan</div>
        <div class="nav-item" onclick="switchView('tab-generator', this)">➕<br>Create</div>
        <div class="nav-item" onclick="switchView('tab-history', this)">📜<br>History</div>
    </div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('app_logs')) || [];

    function switchView(id, el) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'tab-history') renderLogs();
    }

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
        } catch (e) { alert("Camera Permission Required!"); }
    }

    function makeQR() {
        const input = document.getElementById('qr-data').value;
        if(!input) return;
        const out = document.getElementById('qr-output');
        out.innerHTML = "";
        new QRCode(out, { text: input, width: 160, height: 160 });
        logs.push({val: input, time: new Date().toLocaleTimeString()});
        localStorage.setItem('app_logs', JSON.stringify(logs));
    }

    function renderLogs() {
        const div = document.getElementById('log-list');
        div.innerHTML = logs.length ? logs.map(l => `<div style="background:#fff; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; font-size:13px; border:1px solid #ddd;"><b>${l.val}</b><span style="color:#888;">${l.time}</span></div>`).reverse().join('') : "<p style='text-align:center; color:#888;'>No scans found</p>";
    }
</script>
</body>
</html>
